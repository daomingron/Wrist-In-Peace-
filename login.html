<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrist In Peace Login</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #e6e6e6, #cfd3d8);
        color: #23272f;
      }
      .login-card {
        width: min(92vw, 430px);
        background: #f7f7f7;
        color: #23272f;
        padding: 28px;
        border-radius: 20px;
        box-shadow: 0 16px 38px rgba(35, 39, 47, 0.12);
        border: 1px solid #d7dce2;
      }
      .login-card h1 {
        margin-top: 0;
      }
      .login-card form {
        display: grid;
        gap: 12px;
      }
      .login-card input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #d7dce2;
        background: #fff;
      }
      .login-card button {
        width: 100%;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Wrist In Peace</h1>
      <p>Sign in to access the inventory dashboard and summary pages.</p>
      <form id="login-form">
        <input id="username-input" type="text" name="username" placeholder="Username" required />
        <input id="password-input" type="password" name="password" placeholder="Password" required />
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p style="margin-top: 12px; color: #6d7a8a;">Default credentials: admin / admin123</p>
    </div>

    <script>
      const loginForm = document.getElementById('login-form');
      const usernameInput = document.getElementById('username-input');
      const passwordInput = document.getElementById('password-input');

      loginForm.addEventListener('submit', (event) => {
        event.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (username === 'admin' && password === 'admin123') {
          localStorage.setItem('watchInventoryAuth', 'true');
          localStorage.setItem('watchInventoryUser', username);
          window.location.href = 'index.html';
        } else {
          alert('Invalid username or password.');
        }
      });
    </script>
  </body>
</html>
